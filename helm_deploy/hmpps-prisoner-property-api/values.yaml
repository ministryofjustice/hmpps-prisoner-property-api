generic-service:
  nameOverride: hmpps-prisoner-property-api
  productId: "DPS136" # productId for the product that this belongs too, i.e. DPS001, see README.md for details

  # Dedicated IRSA service account (see cloud-platform-environments prisoner-property-irsa.tf)
  serviceAccountName: hmpps-prisoner-property-api

  replicaCount: 4

  image:
    repository: ghcr.io/ministryofjustice/hmpps-prisoner-property-api
    tag: app_version # override at deployment time
    port: 8080

  ingress:
    enabled: true
    host: app-hostname.local # override per environment
    tlsSecretName: hmpps-prisoner-property-api-cert
    # MOJ assurance: enable ModSecurity WAF (OWASP Core Rule Set) at the ingress.
    modsecurity_enabled: true
    # Defining a snippet overrides the chart default, so we reproduce the standard
    # blocking scaffold (engine on, team/namespace log tag, method allowlist, 406 denial)
    # and then add a path-scoped exclusion for the NOMIS sync/migrate endpoints.
    modsecurity_snippet: |
      SecRuleEngine On
      # team tag grants OpenSearch access to investigate any future blockage
      SecDefaultAction "phase:2,pass,log,tag:github_team=move-a-prisoner,tag:namespace={{ .Release.Namespace }}"
      # Standard method allowlist (chart default is only GET HEAD POST OPTIONS)
      SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE,setvar:tx.paranoia_level=3"
      # Make ModSecurity denials a 406 so blocks are distinguishable from app errors
      SecRuleUpdateActionById 949110 "t:none,deny,status:406,logdata:%{SERVER_NAME}"
      SecRuleUpdateActionById 959100 "t:none,deny,status:406,logdata:%{SERVER_NAME}"
      # NOMIS SEAL_MARK is free text and legitimately contains -- (SQL comment) and SH /sh
      # (shell) tokens that trip the CRS. These endpoints are authenticated (SYNC role), internal
      # NOMIS->DPS traffic, and the app uses only parameterised JPA queries, so disable the offending
      # rules for the sync path ONLY. Rule IDs confirmed from the OpenSearch modsec audit log.
      # NB: nginx wraps this whole snippet in a single-quoted modsecurity_rules directive, so it
      # must contain no apostrophe characters anywhere (including in comments) or the config breaks.
      SecRule REQUEST_URI "@beginsWith /sync/property-containers" "id:900900,phase:1,pass,nolog,ctl:ruleRemoveById=942440,ctl:ruleRemoveById=932160"

  # Environment variables to load into the deployment
  env:
    SERVER_PORT: "8080"
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: applicationinsights.json
    # Use the IRSA web identity token to access SQS/SNS
    HMPPS_SQS_USE_WEB_TOKEN: "true"
    # JAVA_TOOL_OPTIONS is set in the base image (hmpps-eclipse-temurin) with:
    #   -XX:MaxRAMPercentage=50.0
    # Uncomment below to override memory settings if needed.
    # Check resources.limits.memory is set appropriately.
    #
    # Percentage-based example:
    #   JAVA_TOOL_OPTIONS: "-XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0"
    #
    # Fixed memory example:
    #   JAVA_TOOL_OPTIONS: "-Xms512m -Xmx1024m"

  # Pre-existing kubernetes secrets to load as environment variables in the deployment.
  # namespace_secrets:
  #   [name of kubernetes secret]:
  #     [name of environment variable as seen by app]: [key of kubernetes secret to load]

  namespace_secrets:
    hmpps-prisoner-property-api-application-insights:
      APPLICATIONINSIGHTS_CONNECTION_STRING: "APPLICATIONINSIGHTS_CONNECTION_STRING"
    # HMPPS Auth system client (client_credentials) for calling prisoner-search and
    # locations-inside-prison. Secret provisioned in cloud-platform-environments.
    hmpps-prisoner-property-api-client-creds:
      SYSTEM_CLIENT_ID: "API_CLIENT_ID"
      SYSTEM_CLIENT_SECRET: "API_CLIENT_SECRET"
    # Postgres RDS (prisoner-property-rds.tf)
    prisoner-property-rds-instance-output:
      DATABASE_ENDPOINT: "rds_instance_endpoint"
      DATABASE_NAME: "database_name"
      DATABASE_USERNAME: "database_username"
      DATABASE_PASSWORD: "database_password"
      SPRING_FLYWAY_USER: "database_username"
      SPRING_FLYWAY_PASSWORD: "database_password"
    # Inbound domain-events queue + DLQ (prisoner-property-sqs.tf)
    sqs-prisoner-property-event-queue-secret:
      HMPPS_SQS_QUEUES_PRISONERPROPERTY_QUEUE_NAME: "sqs_queue_name"
    sqs-prisoner-property-event-dlq-secret:
      HMPPS_SQS_QUEUES_PRISONERPROPERTY_DLQ_NAME: "sqs_queue_name"
    # Shared hmpps-domain-events SNS topic for publishing (existing secret)
    hmpps-domain-events-topic:
      HMPPS_SQS_TOPICS_DOMAINEVENTS_ARN: "topic_arn"

  allowlist:
    groups:
      - internal

generic-prometheus-alerts:
  targetApplication: hmpps-prisoner-property-api
