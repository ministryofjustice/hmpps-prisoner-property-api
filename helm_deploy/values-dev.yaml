---
# Per environment values which override defaults in hmpps-prisoner-property-api/values.yaml

generic-service:
  replicaCount: 2

  ingress:
    host: prisoner-property-api-dev.hmpps.service.justice.gov.uk

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: "applicationinsights.dev.json"
    HMPPS_AUTH_URL: "https://sign-in-dev.hmpps.service.justice.gov.uk/auth"
    PRISONER_SEARCH_URL: "https://prisoner-search-dev.prison.service.justice.gov.uk"
    PRISON_REGISTER_URL: "https://prison-register-dev.hmpps.service.justice.gov.uk"
    LOCATIONS_INSIDE_PRISON_URL: "https://locations-inside-prison-api-dev.hmpps.service.justice.gov.uk"
    SPRINGDOC_API-DOCS_ENABLED: "true"
    SPRINGDOC_SWAGGER-UI_ENABLED: "true"

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  alertSeverity: move-a-prisoner-alerts-nonprod
