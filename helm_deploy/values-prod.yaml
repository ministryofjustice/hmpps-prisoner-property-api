---
# Per environment values which override defaults in hmpps-prisoner-property-api/values.yaml

generic-service:
  ingress:
    host: prisoner-property-api.hmpps.service.justice.gov.uk

  env:
    HMPPS_AUTH_URL: "https://sign-in.hmpps.service.justice.gov.uk/auth"
    PRISONER_SEARCH_URL: "https://prisoner-search.prison.service.justice.gov.uk"
    PRISON_REGISTER_URL: "https://prison-register.hmpps.service.justice.gov.uk"
    LOCATIONS_INSIDE_PRISON_URL: "https://locations-inside-prison-api.hmpps.service.justice.gov.uk"

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  alertSeverity: move-a-prisoner-alerts-prod
