info.app:
  name: HMPPS Prisoner Property API
  version: 1.0

spring:
  application:
    name: hmpps-prisoner-property-api

  profiles:
    group:
      dev:
        - "localstack"
      test:
        - "localstack"

  jackson:
    time-zone: "Europe/London"

  jpa:
    open-in-view: false
    show-sql: false
    generate-ddl: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_batch_fetch_size: 100

  flyway:
    enabled: true
    locations: classpath:db/migration

  datasource:
    url: 'jdbc:postgresql://${DATABASE_ENDPOINT}/${DATABASE_NAME}?sslmode=verify-full'
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      pool-name: PRISONER-PROPERTY-CP
      maximum-pool-size: 10
      max-lifetime: 600000
      connection-timeout: 1000
      validation-timeout: 500
      auto-commit: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${hmpps-auth.url}/.well-known/jwks.json

      client:
        provider:
          hmpps-auth:
            token-uri: ${hmpps-auth.url}/oauth/token
  http:
    codecs:
      max-in-memory-size: 10MB
  web:
    error:
      include-message: always

server:
  port: 8080
  servlet:
    context-path: /
  forward-headers-strategy: native
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      internal-proxies: 10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|169\.254\.\d{1,3}\.\d{1,3}|127\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.1[6-9]{1}\.\d{1,3}\.\d{1,3}|172\.2[0-9]{1}\.\d{1,3}\.\d{1,3}|172\.3[0-1]{1}\.\d{1,3}\.\d{1,3}|0:0:0:0:0:0:0:1|::1|100\.6[4-9]\.\d{1,3}\.\d{1,3}|100\.[7-9][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.1[0-1][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.12[0-7]\.\d{1,3}\.\d{1,3}
  shutdown: graceful

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: 'info, health'
  endpoint:
    health:
      cache:
        time-to-live: 2000ms
      show-components: always
      show-details: always
      probes:
        enabled: true
    info:
      cache:
        time-to-live: 2000ms

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

hmpps.sqs:
  queueAdminRole: ROLE_PRISONER_PROPERTY_QUEUE_ADMIN
  queues:
    prisonerproperty:
      queueName: ${HMPPS_SQS_QUEUES_PRISONERPROPERTY_QUEUE_NAME:}
      dlqName: ${HMPPS_SQS_QUEUES_PRISONERPROPERTY_DLQ_NAME:}
      subscribeTopicId: domainevents
      subscribeFilter: '{"eventType":["prison-offender-events.prisoner.released","prison-offender-events.prisoner.received"]}'
  topics:
    domainevents:
      arn: ${HMPPS_SQS_TOPICS_DOMAINEVENTS_ARN:}
