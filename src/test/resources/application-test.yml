server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

hmpps-auth:
  url: "http://localhost:8090/auth"

api:
  base:
    url:
      prisoner-search: "http://localhost:8091"
      prison-register: "http://localhost:8092"
      locations-inside-prison: "http://localhost:8093"

system:
  client:
    id: clientid
    secret: clientsecret

spring:
  datasource:
    url: 'jdbc:postgresql://localhost:5432/prisoner_property'
    username: prisoner_property
    password: prisoner_property
    hikari:
      maximum-pool-size: 5

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
